<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التوقيت السواحلي الديناميكي | ليبيا</title>
    
    <!-- خطوط Google: Tajawal للعربية و JetBrains Mono للأرقام -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Tajawal"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        theme: {
                            bg: 'var(--bg-color)',
                            primary: 'var(--text-primary)',
                            secondary: 'var(--text-secondary)',
                            accent: 'var(--accent)',
                            surface: 'var(--surface)'
                        }
                    }
                }
            }
        }
    </script>

    <!-- ملف التنسيقات المخصصة -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased min-h-screen flex flex-col items-center justify-center p-6 transition-colors duration-1000 ease-in-out">
    
    <!-- شاشة التحميل -->
    <div id="loader" class="fixed inset-0 z-50 flex items-center justify-center bg-theme-bg text-theme-secondary font-sans text-sm tracking-widest transition-opacity duration-500">
        جاري تهيئة الإحداثيات...
    </div>

    <!-- الحاوية المعمارية الرئيسية -->
    <main class="w-full max-w-lg border border-theme-accent/20 bg-theme-surface/30 backdrop-blur-sm p-10 shadow-2xl rounded-sm flex flex-col items-center opacity-0 transition-opacity duration-1000" id="app-container">
        
        <!-- اختيار المدينة -->
        <nav class="w-full flex justify-center gap-4 mb-8 border-b border-theme-accent/20 pb-4" id="city-selector">
            <!-- الأزرار سيتم إنشاؤها عبر JavaScript -->
        </nav>

        <!-- الهيدر: المعلومات الجغرافية -->
        <header class="w-full flex justify-between items-start text-[0.7rem] font-sans text-theme-secondary mb-10">
            <div class="flex flex-col gap-1">
                <span class="text-theme-primary font-bold text-sm tracking-wider" id="city-name">--</span>
                <span>ليبيا</span>
            </div>
            <div class="flex flex-col items-end gap-1 font-mono text-left" dir="ltr">
                <span id="city-lat">Lat --</span>
                <span id="city-lng">Lng --</span>
            </div>
        </header>

        <!-- العرض الرئيسي: التوقيت السواحلي -->
        <section class="text-center w-full flex flex-col items-center mb-10">
            <div class="flex items-baseline gap-2 mb-2" dir="rtl">
                <span class="font-sans font-light text-5xl md:text-6xl text-theme-primary">الساعة</span>
                <span class="font-mono font-light text-6xl md:text-7xl tracking-tight text-theme-primary" id="hour-display">--</span>
            </div>
            <h2 class="font-sans text-lg text-theme-secondary mb-6 font-medium tracking-wide" id="phase-display">
                من --
            </h2>
            <div class="font-mono text-3xl font-medium tracking-wider text-theme-primary opacity-90" id="metric-display" dir="ltr">
                --:--:--
            </div>
        </section>

        <!-- العنصر البصري: قوس حركة الشمس -->
        <div class="relative w-full max-w-[300px] h-[160px] flex justify-center items-center mb-8">
            <svg viewBox="0 0 300 160" class="w-full h-full overflow-visible">
                <!-- خط الأفق -->
                <line x1="10" y1="140" x2="290" y2="140" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4 4" class="opacity-40" />
                
                <!-- قوس الخلفية -->
                <path d="M 30 140 A 120 120 0 0 1 270 140" fill="none" stroke="var(--accent)" stroke-width="1.5" class="opacity-20"/>
                
                <!-- قوس التقدم النشط -->
                <path id="progress-arc" d="M 30 140 A 120 120 0 0 1 270 140" fill="none" stroke="var(--text-primary)" stroke-width="2.5" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" class="opacity-80 transition-all duration-1000 ease-linear" stroke-linecap="round"/>

                <!-- مؤشر الشمس -->
                <circle id="sun-indicator" cx="30" cy="140" r="6" fill="var(--bg-color)" stroke="var(--text-primary)" stroke-width="2" class="transition-all duration-1000 ease-linear"/>
            </svg>
        </div>

        <!-- العرض الثانوي: التوقيت القياسي -->
        <footer class="w-full grid grid-cols-3 gap-4 border-t border-theme-accent/20 pt-8 mt-4 text-center">
            <div class="flex flex-col gap-2">
                <span class="font-sans text-[0.7rem] font-bold text-theme-secondary">شروق الشمس</span>
                <span class="font-mono text-sm text-theme-primary" id="sunrise-time">--:--</span>
            </div>
            
            <div class="flex flex-col gap-2 border-l border-r border-theme-accent/20">
                <span class="font-sans text-[0.7rem] font-bold text-theme-secondary">التوقيت المحلي</span>
                <span class="font-mono text-sm font-semibold text-theme-primary" id="standard-time" dir="ltr">
                    --:--:--
                </span>
            </div>

            <div class="flex flex-col gap-2">
                <span class="font-sans text-[0.7rem] font-bold text-theme-secondary">غروب الشمس</span>
                <span class="font-mono text-sm text-theme-primary" id="sunset-time">--:--</span>
            </div>
        </footer>

    </main>

    <!-- ملف الجافاسكربت -->
    <script src="js/app.js"></script>
</body>
</html>
