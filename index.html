<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث النظام | SolarisSwahili</title>
    <!-- استدعاء نفس الخطوط الخاصة بمشروعك -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Tajawal:wght@300;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['"Tajawal"','sans-serif'],mono:['"JetBrains Mono"','monospace']}}}}</script>
    <style>
        /* سحب نفس هوية مشروعك اللونية بشكل سريع وبدون استدعاء ملفات خارجية تجنبا للمشاكل */
        body {
            background: linear-gradient(160deg, #020617 0%, #0B1120 100%);
            color: #F1F5F9;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .maintenance-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .icon-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="px-4">

    <!-- النجوم كخلفية (بشكل ثابت وجميل) -->
    <div style="position:absolute;inset:0;background-image:radial-gradient(1px 1px at 20% 30%, #fff, transparent), radial-gradient(1.5px 1.5px at 80% 40%, rgba(255,255,255,0.8), transparent), radial-gradient(2px 2px at 40% 80%, rgba(255,255,255,0.6), transparent); background-size:200px 200px; opacity:0.6;"></div>

    <div class="maintenance-card p-10 md:p-14 text-center max-w-lg w-full relative z-10 flex flex-col items-center">
        <!-- أيقونة ترس وساعة تدل على العمل في الكواليس -->
        <svg class="w-20 h-20 mb-6 text-[#F59E0B] icon-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
        </svg>

        <h1 class="text-3xl font-extrabold mb-4">نعمل على تحسينات هامة</h1>
        <p class="text-[var(--text-sec)] text-base md:text-lg leading-relaxed text-[#94A3B8]">
            محرك التوقيت السواحلي التكيفي الخاص بنا <span class="font-bold text-[#F59E0B]">SolarisSwahili</span> 
            يمر بتحديثات جذرية على الخوادم لزيادة الدقة والسرعة.
        </p>
        <p class="mt-8 text-xs tracking-widest text-[#475569] font-mono">
            SYSTEM MAINTENANCE • COME BACK SOON
        </p>
    </div>

</body>
</html>
