<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 512 512"
  width="512"
  height="512"
  role="img"
  aria-label="SolarisSwahili icon — dynamic Swahili time clock"
>
  <!--
  ═══════════════════════════════════════════════════════════════
  SolarisSwahili Icon  •  ساعة التوقيت السواحلي الديناميكية
  Project : https://github.com/azzubairx/SolarisSwahili
  Author  : Azzubair  —  Tobruk, Libya  •  2026
  ═══════════════════════════════════════════════════════════════

  CONCEPT
  ───────
  The icon captures the philosophical heart of Swahili/Ghuroubi
  time: a day measured not from midnight but from the moment the
  sun kisses the horizon.  Every element is intentional:

  ① Sky gradient     — pre-sunrise deep indigo → horizon amber
  ② Outer ring       — Arabic eight-pointed star geometric border
  ③ Horizon line     — the earth / sea separator that anchors time
  ④ Solar arc        — the sun's 180° journey from rise to set
  ⑤ Sun disc         — positioned at dawn (left of arc), glowing
  ⑥ Prayer markers   — five dots spaced along the arc (Fajr to Isha)
  ⑦ Time axis label  — Arabic numeral ١ (first Swahili hour) at rise

  COLOUR PALETTE  (5 colours + transparent background)
  ─────────────────────────────────────────────────────
  --deep-night   : #0D1B2A   — sky depths, structural dark
  --horizon-gold : #F5A623   — golden hour / sun glow
  --dawn-amber   : #E8621A   — horizon warmth
  --arc-cream    : #FEF3C7   — arc track, soft sky light
  --star-white   : #FFFDF7   — stars, labels, highlights
  ─────────────────────────────────────────────────────
  All geometry is path/circle based — fully scalable at any size.
  ═══════════════════════════════════════════════════════════════
  -->

  <!-- ═══════════════════════════════ DEFINITIONS ═══════════════════════════════ -->
  <defs>

    <!-- ── Sky gradient: deep pre-dawn indigo → mid-sky navy → horizon amber ── -->
    <radialGradient id="skyGrad" cx="50%" cy="72%" r="65%">
      <stop offset="0%"   stop-color="#F5A623" stop-opacity="0.55"/>
      <stop offset="35%"  stop-color="#1A2E4A"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </radialGradient>

    <!-- ── Sun core radial glow ── -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFDF7"/>
      <stop offset="45%"  stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#E8621A" stop-opacity="0"/>
    </radialGradient>

    <!-- ── Subtle inner circle fill (sky cap) ── -->
    <radialGradient id="innerSky" cx="50%" cy="80%" r="70%">
      <stop offset="0%"  stop-color="#E8621A" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#1A2E4A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0D1B2A" stop-opacity="0.9"/>
    </radialGradient>

    <!-- ── Horizon glow bar ── -->
    <linearGradient id="horizonGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E8621A" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#F5A623" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#FFFDF7" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#F5A623" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E8621A" stop-opacity="0"/>
    </linearGradient>

    <!-- ── Sun halo filter (blur + glow) ── -->
    <filter id="sunHalo" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- ── Star twinkle filter ── -->
    <filter id="starGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>

    <!-- ── Clip to circle ── -->
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="220"/>
    </clipPath>

  </defs>


  <!-- ═══════════════════════════ LAYER 1 — BACKGROUND DISC ═══════════════════════════ -->
  <!--  Deep sky fill — the night / pre-dawn sky behind everything  -->
  <circle cx="256" cy="256" r="256" fill="#0D1B2A"/>

  <!-- Sky radial wash — horizon warmth rising from the bottom -->
  <circle cx="256" cy="256" r="256" fill="url(#skyGrad)"/>


  <!-- ═══════════════════════════ LAYER 2 — STARS (10 stars, hand-placed) ════════════════ -->
  <!--  Stars appear in the upper / night portion of the sky  -->
  <g fill="#FFFDF7" opacity="0.85">
    <!-- Each star: small circle + tiny glow duplicate -->
    <!-- Star 1 -->
    <circle cx="148" cy=" 82" r="1.6" filter="url(#starGlow)" opacity="0.5"/>
    <circle cx="148" cy=" 82" r="1.1"/>
    <!-- Star 2 -->
    <circle cx="310" cy=" 68" r="1.8" filter="url(#starGlow)" opacity="0.5"/>
    <circle cx="310" cy=" 68" r="1.2"/>
    <!-- Star 3 -->
    <circle cx="205" cy="105" r="1.3" filter="url(#starGlow)" opacity="0.5"/>
    <circle cx="205" cy="105" r="0.9"/>
    <!-- Star 4 -->
    <circle cx="370" cy=" 92" r="2.0" filter="url(#starGlow)" opacity="0.5"/>
    <circle cx="370" cy=" 92" r="1.4"/>
    <!-- Star 5 -->
    <circle cx="420" cy="145" r="1.4" filter="url(#starGlow)" opacity="0.5"/>
    <circle cx="420" cy="145" r="0.9"/>
    <!-- Star 6 -->
    <circle cx=" 98" cy="148" r="1.5" filter="url(#starGlow)" opacity="0.5"/>
    <circle cx=" 98" cy="148" r="1.0"/>
    <!-- Star 7 -->
    <circle cx="258" cy=" 52" r="2.2" filter="url(#starGlow)" opacity="0.6"/>
    <circle cx="258" cy=" 52" r="1.5"/>
    <!-- Star 8 -->
    <circle cx="436" cy="200" r="1.2" filter="url(#starGlow)" opacity="0.4"/>
    <circle cx="436" cy="200" r="0.8"/>
    <!-- Star 9 -->
    <circle cx=" 78" cy="200" r="1.7" filter="url(#starGlow)" opacity="0.5"/>
    <circle cx=" 78" cy="200" r="1.2"/>
    <!-- Star 10 -->
    <circle cx="182" cy=" 62" r="1.3" filter="url(#starGlow)" opacity="0.4"/>
    <circle cx="182" cy=" 62" r="0.9"/>
  </g>


  <!-- ═══════════════════════════ LAYER 3 — GEOMETRIC OUTER RING ═══════════════════════ -->
  <!--
    Arabic / Islamic geometric border:
    An eight-pointed star (khatam) ring built from two overlapping
    squares (one straight, one rotated 45°).  The ring is rendered as
    a thick stroke on a circle with a star-polygon dash pattern.
    Two concentric decorative rule lines flank it.
  -->

  <!-- Outer rule line -->
  <circle cx="256" cy="256" r="246"
          fill="none"
          stroke="#F5A623" stroke-width="1.2" stroke-opacity="0.45"/>

  <!-- Eight-pointed star ring — achieved by stroking with a dash
       pattern computed for 8 large + 8 small segments around
       circumference ≈ 2π × 234 ≈ 1470 px.
       Large dash ≈ 70 px, gap ≈ 20 px (×8 = 720), rotated 22.5°
       to align a point to top-right. -->
  <circle cx="256" cy="256" r="234"
          fill="none"
          stroke="#F5A623" stroke-width="11" stroke-opacity="0.90"
          stroke-dasharray="68 16 12 16"
          stroke-linecap="butt"
          transform="rotate(-90 256 256)"/>

  <!-- Inner rule line -->
  <circle cx="256" cy="256" r="222"
          fill="none"
          stroke="#F5A623" stroke-width="1.0" stroke-opacity="0.40"/>

  <!-- Eight diamond ornament dots at cardinal + diagonal positions -->
  <g fill="#F5A623" opacity="0.95">
    <!-- N, NE, E, SE, S, SW, W, NW at r=234 -->
    <!-- N  --> <circle cx="256" cy=" 22" r="4"/>
    <!-- NE --> <circle cx="421" cy=" 91" r="4"/>
    <!-- E  --> <circle cx="490" cy="256" r="4"/>
    <!-- SE --> <circle cx="421" cy="421" r="4"/>
    <!-- S  --> <circle cx="256" cy="490" r="4"/>
    <!-- SW --> <circle cx=" 91" cy="421" r="4"/>
    <!-- W  --> <circle cx=" 22" cy="256" r="4"/>
    <!-- NW --> <circle cx=" 91" cy=" 91" r="4"/>
  </g>


  <!-- ═══════════════════════════ LAYER 4 — INNER SKY CAP (clipped) ════════════════════ -->
  <circle cx="256" cy="256" r="220" fill="url(#innerSky)"/>


  <!-- ═══════════════════════════ LAYER 5 — HORIZON & EARTH ═══════════════════════════ -->
  <!--  The horizon sits at y=330 inside the 512 canvas.
        Below it is the earth; above is sky.  -->

  <!-- Earth / ground fill — deep warm dark -->
  <rect x="36" y="330" width="440" height="90"
        clip-path="url(#circleClip)"
        fill="#0D1B2A"/>

  <!-- Subtle earth texture — two horizontal dark bands -->
  <rect x="36" y="340" width="440" height="2"
        clip-path="url(#circleClip)"
        fill="#1A2E4A" opacity="0.6"/>
  <rect x="36" y="355" width="440" height="1.5"
        clip-path="url(#circleClip)"
        fill="#1A2E4A" opacity="0.4"/>

  <!-- Horizon glow bar — the golden light at the edge of the world -->
  <rect x="36" y="325" width="440" height="10"
        clip-path="url(#circleClip)"
        fill="url(#horizonGlow)"/>

  <!-- Horizon line — crisp bright edge -->
  <line x1="36" y1="330" x2="476" y2="330"
        stroke="#FEF3C7" stroke-width="1.8" stroke-opacity="0.85"
        clip-path="url(#circleClip)"/>


  <!-- ═══════════════════════════ LAYER 6 — SOLAR ARC TRACK ═══════════════════════════ -->
  <!--
    The arc represents the sun's 180° journey from sunrise (left)
    to sunset (right) at horizon level y=330.  It is a semicircle
    of radius 188, centred horizontally at x=256, base at y=330.
    Centre of arc circle: (256, 330).  Arc track in cream/gold.
  -->

  <!-- Arc track — dashed to evoke measurement / clock face -->
  <path d="M 68,330 A 188,188 0 0,1 444,330"
        fill="none"
        stroke="#FEF3C7" stroke-width="2.2" stroke-opacity="0.55"
        stroke-dasharray="6 8"/>

  <!-- Arc track — subtle solid underlay -->
  <path d="M 68,330 A 188,188 0 0,1 444,330"
        fill="none"
        stroke="#F5A623" stroke-width="1.0" stroke-opacity="0.30"/>

  <!-- Hour tick marks along the arc — 11 inner ticks for hours 2-12 (rise=1, set=12) -->
  <!--  Computed positions on arc (r=188, cx=256, cy=330):
        angle θ from 180° to 0° in 12 steps (every 15°).
        x = 256 + 188·cos(θ), y = 330 − 188·sin(θ)
        We mark hours 1-12 with short radial ticks.  -->
  <g stroke="#FEF3C7" stroke-width="1.2" stroke-opacity="0.50">
    <!-- θ=165° (hour 2)  x≈68+188·cos165°=256-181.7=74.3, y=330-48.7=281.3 -->
    <line x1="74"  y1="281" x2=" 81" y2="273"/>
    <!-- θ=150° (hour 3)  x=256-162.8=93.2, y=330-94=236 -->
    <line x1=" 93" y1="236" x2="102" y2="230"/>
    <!-- θ=135° (hour 4)  x=256-133=123, y=330-133=197 -->
    <line x1="123" y1="197" x2="133" y2="193"/>
    <!-- θ=120° (hour 5)  x=256-94=162, y=330-163=167 -->
    <line x1="162" y1="167" x2="172" y2="164"/>
    <!-- θ=105° (hour 6)  x=256-48.7=207.3, y=330-181.7=148.3 -->
    <line x1="207" y1="148" x2="216" y2="147"/>
    <!-- θ=90°  (hour 7 – noon)  x=256, y=330-188=142 -->
    <line x1="256" y1="142" x2="256" y2="133"/>
    <!-- θ=75°  (hour 8)  x=256+48.7=304.7, y=148.3 -->
    <line x1="305" y1="148" x2="296" y2="147"/>
    <!-- θ=60°  (hour 9)  x=256+94=350, y=167 -->
    <line x1="350" y1="167" x2="340" y2="164"/>
    <!-- θ=45°  (hour 10) x=256+133=389, y=197 -->
    <line x1="389" y1="197" x2="379" y2="193"/>
    <!-- θ=30°  (hour 11) x=256+162.8=418.8, y=236 -->
    <line x1="419" y1="236" x2="410" y2="230"/>
    <!-- θ=15°  (hour 12) x=256+181.7=437.7, y=281.3 -->
    <line x1="438" y1="281" x2="431" y2="273"/>
  </g>


  <!-- ═══════════════════════════ LAYER 7 — PRAYER-TIME MARKERS ════════════════════════ -->
  <!--
    Five dots mark the canonical Swahili prayer times along the arc.
    Approximate angular positions (from Fajr/pre-dawn to Isha/night):
      Fajr   — before sunrise — shown left of arc start (below horizon)
      Dhuhr  — solar noon   — arc top (90°) = x=256, y=142
      Asr    — afternoon    — θ=55°  ≈ x=364, y=176
      Maghrib— just after   — arc right end + tiny offset
      Isha   — night        — below horizon right, shown as faded dot

    On-arc dots (Fajr excluded as it precedes sunrise, shown at base):
  -->
  <g>
    <!-- Dhuhr — solar noon — top of arc -->
    <circle cx="256" cy="142" r="5.5"
            fill="#FFFDF7" stroke="#F5A623" stroke-width="1.8"/>
    <!-- Small label tick already provided by hour marks above -->

    <!-- Asr — θ=55° → x=256+188·cos55°=256+107.8=363.8, y=330-188·sin55°=330-154=176 -->
    <circle cx="364" cy="176" r="4.5"
            fill="#F5A623" stroke="#FFFDF7" stroke-width="1.5"/>

    <!-- Fajr proxy dot at arc start base — faded, near horizon left -->
    <circle cx=" 68" cy="330" r="4.0"
            fill="none" stroke="#FEF3C7" stroke-width="1.5" opacity="0.6"/>

    <!-- Maghrib proxy — at arc end right base -->
    <circle cx="444" cy="330" r="4.0"
            fill="none" stroke="#FEF3C7" stroke-width="1.5" opacity="0.6"/>

    <!-- Isha — night — below horizon right, faded crescent companion -->
    <circle cx="444" cy="355" r="3.5"
            fill="none" stroke="#FEF3C7" stroke-width="1.2" opacity="0.35"/>
  </g>


  <!-- ═══════════════════════════ LAYER 8 — SUN DISC (dawn position) ═══════════════════ -->
  <!--
    The sun sits at sunrise position: left end of arc, x=68, y=330.
    It is shown rising — partially above the horizon line.
    Centre offset slightly above horizon: y=318.
    A wide radial glow radiates behind it in the dawn palette.
  -->

  <!-- Sun outer halo — large soft glow -->
  <circle cx=" 68" cy="318" r="52"
          fill="url(#sunGlow)" opacity="0.45"
          filter="url(#sunHalo)"/>

  <!-- Sun mid glow -->
  <circle cx=" 68" cy="318" r="30"
          fill="#F5A623" opacity="0.35"
          filter="url(#sunHalo)"/>

  <!-- Sun disc — clipped to horizon so it "rises" from it -->
  <clipPath id="horizonClip">
    <rect x="0" y="0" width="512" height="330"/>
  </clipPath>
  <circle cx=" 68" cy="318" r="22"
          fill="url(#sunGlow)"
          clip-path="url(#horizonClip)"/>

  <!-- Sun core bright centre -->
  <circle cx=" 68" cy="318" r="12"
          fill="#FFFDF7"
          clip-path="url(#horizonClip)"/>

  <!-- Sun corona rays — 8 short lines radiating outward -->
  <g stroke="#F5A623" stroke-width="2" stroke-linecap="round" opacity="0.80">
    <!-- Only rays above horizon are drawn -->
    <line x1=" 68" y1="288" x2=" 68" y2="279"/>  <!-- up -->
    <line x1=" 89" y1="296" x2=" 96" y2="289"/>  <!-- up-right -->
    <line x1=" 96" y1="318" x2="105" y2="318"/>  <!-- right -->
    <line x1=" 89" y1="340" x2=" 96" y2="347"/>  <!-- down-right (below horizon – clipped) -->
    <line x1=" 47" y1="296" x2=" 40" y2="289"/>  <!-- up-left -->
    <line x1=" 40" y1="318" x2=" 31" y2="318"/>  <!-- left -->
  </g>


  <!-- ═══════════════════════════ LAYER 9 — CRESCENT MOON (upper right) ═════════════════ -->
  <!--
    A crescent moon occupies the upper-right sky — it is the symbol
    of the night phase of the Swahili day and of Islamic heritage.
    Built from two overlapping circles (standard crescent construction).
  -->
  <g clip-path="url(#circleClip)">
    <!-- Moon body -->
    <circle cx="390" cy="115" r="28" fill="#FEF3C7"/>
    <!-- Occluding circle shifts right + slight up to carve the crescent -->
    <circle cx="405" cy="110" r="24" fill="#0D1B2A"/>
    <!-- Tiny stars near crescent -->
    <circle cx="430" cy=" 95" r="1.8" fill="#FEF3C7" opacity="0.7"/>
    <circle cx="445" cy="125" r="1.2" fill="#FEF3C7" opacity="0.5"/>
    <circle cx="415" cy=" 78" r="1.4" fill="#FEF3C7" opacity="0.6"/>
  </g>


  <!-- ════════════════════════════ LAYER 10 — ARABIC NUMERAL ١ ═════════════════════════ -->
  <!--
    The Arabic-Indic numeral ١ (one) at the sunrise point reinforces
    the Swahili convention: "Hour 1 begins at sunrise."
    Placed just above and right of the sun disc.
  -->
  <text x="100" y="318"
        font-family="'Tajawal', 'Amiri', 'Scheherazade New', serif"
        font-size="38"
        font-weight="700"
        fill="#F5A623"
        text-anchor="middle"
        dominant-baseline="central"
        opacity="0.90">١</text>


  <!-- ════════════════════════════ LAYER 11 — WORDMARK (bottom arc) ════════════════════ -->
  <!--
    "SOLARIS SWAHILI" rendered along a gentle curve following the
    inner base of the geometric ring.  Using textPath on a named arc.
    Two tiers: "SOLARIS" in gold, "SWAHILI" in cream below it.
  -->
  <defs>
    <!-- Bottom text arc path — slight convex curve at the bottom -->
    <path id="bottomArc"
          d="M 90,412 A 186,186 0 0,0 422,412"/>
  </defs>

  <!-- "SOLARIS" -->
  <text font-family="'Cinzel', 'Cormorant Garamond', 'Palatino Linotype', serif"
        font-size="22"
        font-weight="700"
        fill="#F5A623"
        letter-spacing="5"
        text-anchor="middle">
    <textPath href="#bottomArc" startOffset="50%">SOLARIS</textPath>
  </text>

  <!-- "SWAHILI" — slightly smaller, in cream, offset along arc -->
  <defs>
    <path id="bottomArc2"
          d="M 110,434 A 168,168 0 0,0 402,434"/>
  </defs>
  <text font-family="'Cinzel', 'Cormorant Garamond', 'Palatino Linotype', serif"
        font-size="17"
        font-weight="400"
        fill="#FEF3C7"
        letter-spacing="7"
        text-anchor="middle"
        opacity="0.90">
    <textPath href="#bottomArc2" startOffset="50%">SWAHILI</textPath>
  </text>


  <!-- ════════════════════════════ LAYER 12 — FINAL RING VIGNETTE ══════════════════════ -->
  <!--  Soft dark vignette ring to frame everything cleanly  -->
  <circle cx="256" cy="256" r="256"
          fill="none"
          stroke="#0D1B2A" stroke-width="18" stroke-opacity="0.6"/>

</svg>
