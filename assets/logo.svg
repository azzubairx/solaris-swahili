  <path d="M 3 22 A 13 13 0 0 1 29 22"
        stroke="#F59E0B" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Solar disc -->
  <circle cx="16" cy="9" r="5.5" fill="#F59E0B"/>
  <!-- Horizon dots -->
  <circle cx="3"  cy="22" r="1.5" fill="#F59E0B" opacity="0.55"/>
  <circle cx="29" cy="22" r="1.5" fill="#F59E0B" opacity="0.55"/>
  <!-- Wordmark -->
  <text x="38" y="22"
        font-family="JetBrains Mono, Courier New, monospace"
        font-size="13"
        font-weight="600"
        fill="currentColor"
