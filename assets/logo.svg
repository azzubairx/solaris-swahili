<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 156 30" fill="none">
  <!-- ── Arc / horizon line ─────────────────────────────── -->
  <line x1="3" y1="22" x2="29" y2="22"
        stroke="#F59E0B" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.55"/>

  <!-- ── Sun arc path ──────────────────────────────────── -->
  <path d="M 3 22 A 13 13 0 0 1 29 22"
        stroke="#F59E0B" stroke-width="1.6" stroke-linecap="round" opacity="0.70"/>

  <!-- ── Horizon dots ───────────────────────────────────── -->
  <circle cx="3"  cy="22" r="1.4" fill="#F59E0B" opacity="0.55"/>
  <circle cx="29" cy="22" r="1.4" fill="#F59E0B" opacity="0.55"/>

  <!-- ── Sun glow ───────────────────────────────────────── -->
  <circle cx="16" cy="9" r="9" fill="rgba(251,191,36,0.16)"/>

  <!-- ── Sun body ───────────────────────────────────────── -->
  <circle cx="16" cy="9" r="5"
          fill="white" stroke="#F59E0B" stroke-width="2"/>

  <!-- ── Wordmark ───────────────────────────────────────── -->
  <text x="38" y="19"
        font-family="'JetBrains Mono', Consolas, 'Courier New', monospace"
        font-size="11.5"
        font-weight="700"
        fill="currentColor"
        letter-spacing="0.02em">SolarisSwahili</text>
</svg>
