                      fill="none" stroke="url(#da-g)" stroke-width="4"

                <g id="demo-body" transform="translate(150,10)">

<script src="js/i18n.js"></script>
<script>
(function () {
    'use strict';

    /* ── Full bilingual content table ─────────────────────────
     * about.html is content-heavy prose, so every block is owned
     * here (innerHTML, to preserve inline <strong> styling) rather
     * than relying on the shared i18n.js, which only knows nav keys.
     */
    const T = {
        ar: {
            heroTitle: 'التوقيت السواحلي<br><span style="color:var(--day-clr)">التكيفي بالساعات القياسية</span>',
            heroSub: 'نظامٌ توقيتي يضع الشمس في مركز الزمن. يعيد العدّاد صفرته عند الشروق وعند الغروب، ويعبّر عن الوقت بساعاتٍ قياسيةٍ تامة (60 دقيقة)، فيعكس عددها الطول الفعلي للنهار والليل.',
            demoSr: 'شروق', demoSs: 'غروب', demoPeak: 'ذروة',

            sec1Title: 'ما هو التوقيت السواحلي؟',
            sec1Body: 'التوقيت السواحلي (Swahili Time) نظامٌ توقيتي تقليدي شائعٌ في شرق أفريقيا وأجزاء من شمال أفريقيا واليمن. جوهره: <strong style="color:var(--day-clr)">صفر الساعة عند الشروق</strong> لا عند منتصف الليل. أما هذا التطبيق فيُطبّق النموذج <strong style="color:var(--day-clr)">التكيفي بالساعات القياسية</strong> الذي يجمع بين روح هذا الموروث ودقة الساعة الحديثة.',
            sec1Note: '<strong style="color:var(--day-clr)">الفرق الجوهري:</strong> في النموذج التقليدي تُقسَّم فترة النهار إلى اثنتَي عشرةَ ساعةً متساويةً دائمًا — فكل ساعة تمتد في الصيف وتنكمش في الشتاء. أما هذا التطبيق فيستخدم ساعاتٍ قياسيةً ثابتةً (60 دقيقة) تُعدّ منذ الشروق (للنهار) أو الغروب (لليل)، فيتجاوز عددها 12 في الصيف الطويل ويقلّ في الشتاء.',

            sec2Title: 'المقارنة بين الأنظمة الثلاثة',
            comp1Label: 'التوقيت المدني القياسي',
            comp1List: ['يبدأ عند منتصف الليل (00:00)', 'كل ساعة 60 دقيقةً ثابتةً', 'لا يرتبط بحركة الشمس', '24 ساعةً دائمًا في اليوم'],
            comp2Label: 'التوقيت السواحلي التقليدي',
            comp2List: ['يبدأ عند الشروق (الساعة 1)', '12 ساعةً نهارًا + 12 ليلًا', 'الساعة تمتد وتنكمش مع اليوم', 'الساعة 6 = الظهر دائمًا'],
            comp3Label: 'هذا التطبيق — التكيفي القياسي',
            comp3List: ['يبدأ عند الشروق (الساعة 1)', 'كل ساعة 60 دقيقةً قياسيةً', 'عدد الساعات يعكس طول اليوم', 'صيفًا: قد تبلغ الساعة 15 قبل الغروب'],

            sec3Title: 'مثال تطبيقي — طبرق في يومٍ صيفي',
            sec3Intro: 'يشرق النهار في طبرق في يومٍ صيفي نحو الساعة 06:02 صباحًا ويغرب نحو 20:19 مساءً، فيبلغ طول النهار نحو 14 ساعةً و17 دقيقةً.',
            tl1Time: 'الساعة 1', tl1Desc: '06:02 — الشروق، يبدأ عدّاد النهار', tl1Clr: 'var(--day-clr)',
            tl2Time: 'الساعة 7', tl2Desc: '13:02 — سبع ساعاتٍ قياسيةٍ بعد الشروق', tl2Clr: 'var(--day-clr)',
            tl3Time: 'الساعة 14', tl3Desc: '20:02 — أربعَ عشرةَ ساعةً منذ الشروق', tl3Clr: 'var(--day-clr)',
            tl4Time: 'الساعة 1 ليلًا', tl4Desc: '20:19 — الغروب، يُعاد الضبط لليل', tl4Clr: 'var(--night-clr)',

            sec4Title: 'لماذا الساعات القياسية لا النسبية؟',
            sec4Body: 'النموذج التقليدي جميلٌ فلسفيًّا — الساعة السادسة تعني دائمًا منتصف النهار — لكنه يُعقّد الحسابات العملية. النموذج القياسي التكيفي يحافظ على روح هذا الموروث (الزمن يبدأ بالشمس لا بمنتصف الليل) مع ثبات الساعة عند 60 دقيقة، مما يجعل الحسابات مألوفةً لمن نشأ على التوقيت المدني.',
            sec4Note: '<strong style="color:var(--day-clr)">خلاصة:</strong> اقرأ «الساعة 8 نهارًا» هكذا — «مضت ثماني ساعاتٍ قياسيةٍ (8×60 دقيقة) منذ شروق الشمس في مدينتك اليوم».',

            ctaBack: '← العودة إلى الساعة الحية', ctaCompare: 'مقارنة المدن', ctaDash: 'الإحصائيات',
        },
        en: {
            heroTitle: 'Swahili Time<br><span style="color:var(--day-clr)">Adaptive Standard-Hour Model</span>',
            heroSub: 'A timekeeping system that puts the sun at the centre of the day. The counter resets at sunrise and at sunset, and expresses time in full standard hours (60 minutes), so the count itself reflects the real length of your day and night.',
            demoSr: 'Sunrise', demoSs: 'Sunset', demoPeak: 'Peak',

            sec1Title: 'What Is Swahili Time?',
            sec1Body: 'Swahili Time is a traditional timekeeping system common across East Africa and parts of North Africa and Yemen. Its core idea: <strong style="color:var(--day-clr)">hour zero falls at sunrise</strong>, not midnight. This app implements an <strong style="color:var(--day-clr)">adaptive standard-hour model</strong> that combines the spirit of that tradition with the precision of a modern clock.',
            sec1Note: '<strong style="color:var(--day-clr)">The key difference:</strong> the traditional model always splits daylight into twelve equal hours, so each hour stretches in summer and shrinks in winter. This app instead uses fixed 60-minute standard hours counted from sunrise (daytime) or sunset (night), so the count can exceed 12 on a long summer day and fall short of it in winter.',

            sec2Title: 'Comparing the Three Systems',
            comp1Label: 'Standard Civil Time',
            comp1List: ['Starts at midnight (00:00)', 'Every hour is a fixed 60 minutes', 'Not tied to the sun\'s movement', 'Always 24 hours in a day'],
            comp2Label: 'Traditional Swahili Time',
            comp2List: ['Starts at sunrise (Hour 1)', '12 daytime hours + 12 night hours', 'Each hour stretches or shrinks with the day', 'Hour 6 is always solar noon'],
            comp3Label: 'This App — Adaptive Standard',
            comp3List: ['Starts at sunrise (Hour 1)', 'Every hour is a fixed 60 minutes', 'Hour count reflects the day\'s true length', 'In summer: the hour can reach 15 before sunset'],

            sec3Title: 'Worked Example — Tobruk on a Summer Day',
            sec3Intro: 'On a summer day in Tobruk, the sun rises around 06:02 and sets around 20:19, giving roughly 14 hours and 17 minutes of daylight.',
            tl1Time: 'Hour 1', tl1Desc: '06:02 — Sunrise, the daytime counter begins', tl1Clr: 'var(--day-clr)',
            tl2Time: 'Hour 7', tl2Desc: '13:02 — Seven standard hours after sunrise', tl2Clr: 'var(--day-clr)',
            tl3Time: 'Hour 14', tl3Desc: '20:02 — Fourteen hours since sunrise', tl3Clr: 'var(--day-clr)',
            tl4Time: 'Night Hour 1', tl4Desc: '20:19 — Sunset, the counter resets for the night', tl4Clr: 'var(--night-clr)',

            sec4Title: 'Why Standard Hours, Not Proportional Ones?',
            sec4Body: 'The traditional model is philosophically elegant — hour six always means solar noon — but it complicates practical calculation. The adaptive standard model keeps the spirit of that tradition (time begins with the sun, not midnight) while holding the hour fixed at 60 minutes, making the arithmetic familiar to anyone raised on civil time.',
            sec4Note: '<strong style="color:var(--day-clr)">In short:</strong> read "Hour 8 of daytime" as — "eight standard hours (8×60 minutes) have passed since sunrise in your city today."',

            ctaBack: '← Back to the live clock', ctaCompare: 'Compare cities', ctaDash: 'Dashboard',
        },
    };

    function li(items) { return items.map(s => `<li>⦁ ${s}</li>`).join(''); }
    function tlRow(time, desc, clr) {
        return `<span style="font-family:'JetBrains Mono',monospace;font-size:0.8rem;font-weight:700;color:${clr};min-width:6.5rem;text-align:end;">${time}</span>
                <span class="about-section-body" style="font-size:0.85rem;">${desc}</span>`;
    }

    function applyAboutText() {
        const lang = SubI18N.getLang();
        const d = T[lang];
        const set  = (id, html) => { const e = document.getElementById(id); if (e) e.innerHTML = html; };
        const setT = (id, txt)  => { const e = document.getElementById(id); if (e) e.textContent = txt; };

        set('hero-title', d.heroTitle);
        setT('hero-sub', d.heroSub);
        setT('demo-lbl-sr', d.demoSr); setT('demo-lbl-ss', d.demoSs); setT('demo-lbl-peak', d.demoPeak);

        document.querySelector('#sec1-title span').textContent = d.sec1Title;
        set('sec1-body', d.sec1Body);
        set('sec1-note', d.sec1Note);

        document.querySelector('#sec2-title span').textContent = d.sec2Title;
        setT('comp1-label', d.comp1Label); set('comp1-list', li(d.comp1List));
        setT('comp2-label', d.comp2Label); set('comp2-list', li(d.comp2List));
        setT('comp3-label', d.comp3Label); set('comp3-list', li(d.comp3List));

        document.querySelector('#sec3-title span').textContent = d.sec3Title;
        setT('sec3-intro', d.sec3Intro);
        set('tl-row-1', tlRow(d.tl1Time, d.tl1Desc, d.tl1Clr));
        set('tl-row-2', tlRow(d.tl2Time, d.tl2Desc, d.tl2Clr));
        set('tl-row-3', tlRow(d.tl3Time, d.tl3Desc, d.tl3Clr));
        set('tl-row-4', tlRow(d.tl4Time, d.tl4Desc, d.tl4Clr));

        document.querySelector('#sec4-title span').textContent = d.sec4Title;
        set('sec4-body', d.sec4Body);
        set('sec4-note', d.sec4Note);

        setT('cta-back', d.ctaBack);
        setT('cta-compare', d.ctaCompare);
        setT('cta-dash', d.ctaDash);

        document.documentElement.lang = lang;
        document.documentElement.dir  = lang === 'ar' ? 'rtl' : 'ltr';
    }

    window.toggleLang = function () { SubI18N.toggle(); };
    window.renderAll  = applyAboutText;   /* picked up by i18n.js storage/toggle hooks */

    applyAboutText();

    /* ── Animated demo arc ───────────────────────────────────── */
    let demoProgress = 0.45, demoDir = 1;
    const demoArc  = document.getElementById('demo-arc');
    const demoBody = document.getElementById('demo-body');
    if (demoArc && demoBody) {
        setInterval(() => {
            demoProgress += demoDir * 0.003;
            if (demoProgress > 0.98) demoDir = -1;
            if (demoProgress < 0.02) demoDir =  1;
            demoArc.setAttribute('stroke-dashoffset', (100 - demoProgress * 100).toFixed(2));
            const angle = Math.PI * (1 - demoProgress);
            demoBody.setAttribute('transform',
                `translate(${(150 + 130*Math.cos(angle)).toFixed(1)},${(140 - 130*Math.sin(angle)).toFixed(1)})`);
        }, 50);
    }
})();
</script>
</body>
</html>
