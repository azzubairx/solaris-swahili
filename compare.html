    <script src="js/i18n.js"></script>
    <script>
    'use strict';

    /* ── Constants ───────────────────────────────────────────── */
    const CACHE_TTL  = 6 * 3_600_000;  // 6 hours in ms
    const pad        = n => String(n).padStart(2, '0');

    /* ── State ───────────────────────────────────────────────── */
    const CITIES_STATE = {};  // { [id]: { city, solar } }
    let tickId    = null;
    let _groupGen = 0;        // generation counter for rapid group switching

    /* ── Language ────────────────────────────────────────────── */
    let isEn = SubI18N.getLang() === 'en';
    function toggleLang() {
        SubI18N.toggle();
        isEn = SubI18N.getLang() === 'en';
        renderCards();
    }

    /* ── City presets ─────────────────────────────────────────── */
    const GROUPS = {
        libya: [
            { name:'طبرق',   nameEn:'Tobruk',    country:'ليبيا',   countryEn:'Libya',   lat:32.0773, lng:23.9600 },
            { name:'بنغازي', nameEn:'Benghazi',  country:'ليبيا',   countryEn:'Libya',   lat:32.1167, lng:20.0667 },
            { name:'طرابلس', nameEn:'Tripoli',   country:'ليبيا',   countryEn:'Libya',   lat:32.8892, lng:13.1900 },
        ],
        africa: [
            { name:'طبرق',    nameEn:'Tobruk',   country:'ليبيا',   countryEn:'Libya',   lat:32.0773, lng:23.9600 },
            { name:'القاهرة', nameEn:'Cairo',    country:'مصر',     countryEn:'Egypt',   lat:30.0444, lng:31.2357 },
            { name:'تونس',    nameEn:'Tunis',    country:'تونس',    countryEn:'Tunisia', lat:36.8190, lng:10.1660 },
            { name:'الخرطوم', nameEn:'Khartoum', country:'السودان', countryEn:'Sudan',   lat:15.5007, lng:32.5600 },
        ],
        mideast: [
            { name:'مكة',      nameEn:'Mecca',    country:'السعودية', countryEn:'Saudi Arabia', lat:21.3891, lng:39.8579 },
            { name:'الرياض',   nameEn:'Riyadh',   country:'السعودية', countryEn:'Saudi Arabia', lat:24.6877, lng:46.7219 },
            { name:'عمّان',    nameEn:'Amman',    country:'الأردن',   countryEn:'Jordan',       lat:31.9539, lng:35.9106 },
            { name:'إسطنبول',  nameEn:'Istanbul', country:'تركيا',    countryEn:'Turkey',       lat:41.0082, lng:28.9784 },
        ],
        world: [
            { name:'لندن',    nameEn:'London',   country:'المملكة المتحدة', countryEn:'UK',        lat:51.5074, lng:-0.1278 },
            { name:'طوكيو',   nameEn:'Tokyo',    country:'اليابان',         countryEn:'Japan',     lat:35.6762, lng:139.6503 },
            { name:'نيويورك', nameEn:'New York', country:'الولايات المتحدة', countryEn:'USA',       lat:40.7128, lng:-74.0060 },
            { name:'سيدني',   nameEn:'Sydney',   country:'أستراليا',        countryEn:'Australia', lat:-33.8688, lng:151.2093 },
        ],
    };

    /* ── Cache helpers ────────────────────────────────────────── */
    function cacheGet(k) {
        try {
            const raw = localStorage.getItem(k);
            if (!raw) return null;
            const { ts, data } = JSON.parse(raw);
            return (Date.now() - ts > CACHE_TTL) ? null : data;
        } catch { return null; }
    }
    function cacheSet(k, data) {
        try { localStorage.setItem(k, JSON.stringify({ ts: Date.now(), data })); } catch { /* full */ }
    }

    /* ── Solar data — Open-Meteo ──────────────────────────────── */
    /**
     * Fetch sunrise/sunset data from Open-Meteo.
     *
     * The API returns local-time ISO strings (no timezone marker).
     * Convert to UTC by treating as UTC then subtracting the offset:
     *   local time "06:02" in UTC+2 → 06:02Z − 120 min = 04:02 UTC ✓
     *
     * Array indices with past_days=1 & forecast_days=2:
     *   [0] yesterday  [1] today  [2] tomorrow
     */
    async function fetchSolar(lat, lng) {
        const bucket = Math.floor(Date.now() / CACHE_TTL);
        const k      = `ss_cmp_${lat}_${lng}_${bucket}`;
        const cached = cacheGet(k);
        if (cached) return cached;

        const url = 'https://api.open-meteo.com/v1/forecast'
                  + `?latitude=${lat}&longitude=${lng}`
                  + '&daily=sunrise,sunset,daylight_duration'
                  + '&timezone=auto&past_days=1&forecast_days=2';

        const resp = await fetch(url, { signal: AbortSignal.timeout(12_000) })
                          .then(r => r.json());

        if (resp.error || !resp.daily)
            throw new Error('Solar data unavailable');

        const offMins    = Math.round(resp.utc_offset_seconds / 60);
        const parseLocal = str =>
            str ? new Date(str + 'Z').getTime() - offMins * 60_000 : null;

        let ySunset   = parseLocal(resp.daily.sunset[0]);
        let tSunrise  = parseLocal(resp.daily.sunrise[1]);
        let tSunset   = parseLocal(resp.daily.sunset[1]);
        let tmSunrise = parseLocal(resp.daily.sunrise[2]);

        if (!tSunrise || !tSunset)
            throw new Error('No clear sunrise or sunset (polar region?)');

        /* Temporal ordering guards */
        if (!ySunset)             ySunset   = tSunset   - 86_400_000;
        if (!tmSunrise)           tmSunrise = tSunrise  + 86_400_000;
        if (ySunset  >= tSunrise) ySunset  -= 86_400_000;
        if (tSunset  <= tSunrise) tSunset  += 86_400_000;
        if (tmSunrise <= tSunset) tmSunrise += 86_400_000;

        const data = {
            yesterdaySunset:  ySunset,
            todaySunrise:     tSunrise,
            todaySunset:      tSunset,
            tomorrowSunrise:  tmSunrise,
            dayLengthMs:      resp.daily.daylight_duration[1] * 1_000,
            nightLengthMs:    tmSunrise - tSunset,
            utcOff:           offMins,
            sunriseStr:       resp.daily.sunrise[1]?.slice(11, 16) || '--:--',
            sunsetStr:        resp.daily.sunset[1]?.slice(11, 16)  || '--:--',
        };
        cacheSet(k, data);
        return data;
    }

    /* ── Swahili clock — ABSOLUTE 60-MINUTE MODEL ─────────────── */
    /**
     * Compute the current Swahili time from solar data.
     *
     * The Swahili hour is counted from the START of the current phase
     * using standard 60-minute intervals.  The count is NOT capped at 12
     * — in a 14-hour summer day the counter reaches 14 before sunset.
     *
     * Formula:
     *   elapsed  = now − phaseStart
     *   hour     = ⌊elapsed / 3 600 000⌋ + 1   (1-indexed)
     */
    function computeSwahili(solar) {
        const now = Date.now();
        const { yesterdaySunset, todaySunrise, todaySunset,
                tomorrowSunrise, utcOff } = solar;

        let phase, startMs, endMs;
        if (now < todaySunrise) {
            phase = 'night'; startMs = yesterdaySunset; endMs = todaySunrise;
        } else if (now < todaySunset) {
            phase = 'day';   startMs = todaySunrise;    endMs = todaySunset;
        } else {
            phase = 'night'; startMs = todaySunset;     endMs = tomorrowSunrise;
        }

        const dur     = endMs - startMs;
        const prog    = Math.max(0, Math.min(1, (now - startMs) / dur));
        const elapsed = now - startMs;

        const pH = Math.floor(elapsed / 3_600_000);       // 0-indexed
        const pM = Math.floor((elapsed % 3_600_000) / 60_000);
        const pS = Math.floor((elapsed % 60_000)    / 1_000);

        const loc  = new Date(now + utcOff * 60_000);
        const civil = `${pad(loc.getUTCHours())}:${pad(loc.getUTCMinutes())}:${pad(loc.getUTCSeconds())}`;

        const total  = solar.dayLengthMs + solar.nightLengthMs;
        const dayPct = (solar.dayLengthMs / total * 100).toFixed(0);

        return {
            phase, prog,
            hour: pH + 1,   // 1-indexed Swahili hour (no cap)
            min: pM, sec: pS,
            civil, dayPct,
            dayLengthMs:   solar.dayLengthMs,
            nightLengthMs: solar.nightLengthMs,
            sunriseStr:    solar.sunriseStr,
            sunsetStr:     solar.sunsetStr,
        };
    }

    /* ── SVG arc builder ──────────────────────────────────────── */
    /**
     * Build a small semicircular arc SVG for a compare card.
     *
     * Arc path:  M 10 140 A 140 140 0 0 1 290 140
     * Centre:    (150, 140)  Radius: 140
     * sweep-flag = 1 → clockwise → upper semicircle ✓
     *
     * Celestial body position:
     *   angle = π × (1 − progress)
     *   cx    = 150 + 140 × cos(angle)
     *   cy    = 140 − 140 × sin(angle)
     */
    function buildArcSVG(prog, isNight, cardId) {
        const angle  = Math.PI * (1 - prog);
        const cx     = (150 + 140 * Math.cos(angle)).toFixed(1);
        const cy     = (140 - 140 * Math.sin(angle)).toFixed(1);
        const dash   = (100 - prog * 100).toFixed(1);
        const gid    = `cg-${String(cardId).replace(/[^a-zA-Z0-9_-]/g, '_')}`;

        return `<svg viewBox="0 -20 300 170"
                     style="width:100%;max-width:260px;overflow:visible;"
                     aria-hidden="true">
            <defs>
                <linearGradient id="${gid}" x1="0%" y1="0%" x2="100%" y2="0%">
                    ${isNight
                        ? '<stop offset="0%" stop-color="#3730A3"/><stop offset="50%" stop-color="#818CF8"/><stop offset="100%" stop-color="#3730A3"/>'
                        : '<stop offset="0%" stop-color="#F59E0B"/><stop offset="45%" stop-color="#38BDF8"/><stop offset="100%" stop-color="#F97316"/>'}
                </linearGradient>
            </defs>
            <line x1="10" y1="140" x2="290" y2="140"
                  stroke="var(--accent)" stroke-width="0.8"
                  stroke-dasharray="4 4" opacity="0.3"/>
            <path d="M 10 140 A 140 140 0 0 1 290 140"
                  fill="none" stroke="var(--accent)"
                  stroke-width="1.2" opacity="0.15"/>
            <path d="M 10 140 A 140 140 0 0 1 290 140"
                  fill="none" stroke="url(#${gid})"
                  stroke-width="3.5"
                  pathLength="100" stroke-dasharray="100"
                  stroke-dashoffset="${dash}"
                  stroke-linecap="round"/>
            <circle cx="${cx}" cy="${cy}"
                    r="${isNight ? 6 : 7}"
                    fill="${isNight ? '#E0E7FF' : '#FFF9C4'}"
                    stroke="${isNight ? '#818CF8' : '#F59E0B'}"
                    stroke-width="${isNight ? 2 : 3}"/>
        </svg>`;
    }

    /* ── Rendering ────────────────────────────────────────────── */
    function renderCards() {
        const grid = document.getElementById('compare-grid');

        if (!Object.keys(CITIES_STATE).length) {
            grid.innerHTML = `<p style="color:var(--text-sec);font-size:0.85rem;
                               text-align:center;grid-column:1/-1;padding:3rem 0;">
                               اختر مجموعةً أو أضف مدينةً للبدء</p>`;
            return;
        }

        grid.innerHTML = '';
        Object.entries(CITIES_STATE).forEach(([id, state]) => {
            const card = document.createElement('div');
            card.className = 'compare-card';
            card.id = `card-${id}`;

            const city   = state.city;
            const cname  = isEn ? (city.nameEn  || city.name)    : city.name;
            const ctry   = isEn ? (city.countryEn || city.country) : city.country;

            if (!state.solar) {
                /* Loading state */
                card.innerHTML = `
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                        <div>
                            <div class="compare-city-name">${cname}</div>
                            <div class="compare-country">${ctry}</div>
                        </div>
                        <button onclick="removeCity('${id}')"
                                class="city-del" style="width:22px;height:22px;font-size:0.85rem;"
                                aria-label="إزالة ${cname}">×</button>
                    </div>
                    <div class="compare-loading">
                        <div class="loader-ring" style="width:28px;height:28px;border-width:2px;"></div>
                    </div>`;
            } else {
                const d         = computeSwahili(state.solar);
                const isNight   = d.phase === 'night';
                const phaseIcon = isNight ? '🌙' : '☀️';
                const phaseLbl  = isNight ? (isEn ? 'Night' : 'ليل') : (isEn ? 'Day' : 'نهار');
                const hrLbl     = isEn ? 'Hour' : 'ساعة';

                card.innerHTML = `
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                        <div>
                            <div class="compare-city-name">${cname}</div>
                            <div class="compare-country">${ctry}</div>
                        </div>
                        <button onclick="removeCity('${id}')"
                                class="city-del" style="width:22px;height:22px;font-size:0.85rem;"
                                aria-label="إزالة ${cname}">×</button>
                    </div>

                    <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
                        <span class="compare-hour" aria-label="${hrLbl} ${d.hour}">${d.hour}</span>
                        <div>
                            <div class="compare-phase">${phaseIcon} ${hrLbl} ${phaseLbl}</div>
                            <div style="font-family:'JetBrains Mono',monospace;font-size:0.65rem;
                                        color:var(--text-sec);margin-top:0.2rem;
                                        font-variant-numeric:tabular-nums;"
                                 dir="ltr"
                                 aria-label="الوقت المنقضي">
                                ${pad(d.hour-1)}:${pad(d.min)}:${pad(d.sec)}
                            </div>
                        </div>
                    </div>

                    <div style="text-align:center;">
                        ${buildArcSVG(d.prog, isNight, id)}
                    </div>

                    <div class="compare-times" dir="ltr">
                        <span title="${isEn ? 'Sunrise' : 'الشروق'}"
                              style="color:var(--day-clr)">🌅 ${d.sunriseStr}</span>
                        <span style="color:var(--text-pri);font-variant-numeric:tabular-nums;">
                            ${d.civil}</span>
                        <span title="${isEn ? 'Sunset' : 'الغروب'}"
                              style="color:var(--night-clr)">🌆 ${d.sunsetStr}</span>
                    </div>

                    <div style="background:var(--accent-faint);border-radius:99px;
                                height:5px;overflow:hidden;width:100%;"
                         role="img" aria-label="نسبة النهار ${d.dayPct}٪">
                        <div style="height:100%;background:var(--day-clr);
                                    width:${d.dayPct}%;transition:width 2s;
                                    border-radius:99px;"></div>
                    </div>
                    <div style="display:flex;justify-content:space-between;
                                font-size:0.6rem;color:var(--text-sec);">
                        <span style="color:var(--day-clr)">
                            ${isEn ? 'Day' : 'نهار'} ${d.dayPct}٪
                        </span>
                        <span style="font-variant-numeric:tabular-nums;">
                            ${fmtDur(d.dayLengthMs)} / ${fmtDur(d.nightLengthMs)}
                        </span>
                        <span style="color:var(--night-clr)">
                            ${isEn ? 'Night' : 'ليل'} ${100 - +d.dayPct}٪
                        </span>
                    </div>`;
            }
            grid.appendChild(card);
        });
    }

    /* ── Duration formatter ───────────────────────────────────── */
    function fmtDur(ms) {
        const tot = Math.round(ms / 60_000);
        const h   = Math.floor(tot / 60);
        const m   = tot % 60;
        return isEn
            ? `${h}h${m ? ' ' + m + 'm' : ''}`
            : `${h ? h + 'س' : ''}${m ? ' ' + m + 'د' : ''}`.trim() || '<1د';
    }

    /* ── Group loader ─────────────────────────────────────────── */
    async function loadGroup(name) {
        const myGen = ++_groupGen;
        Object.keys(CITIES_STATE).forEach(k => delete CITIES_STATE[k]);

        const cities = GROUPS[name];
        cities.forEach((c, i) => {
            CITIES_STATE[`grp_${name}_${i}`] = { city: c, solar: null };
        });
        renderCards();

        await Promise.all(cities.map(async (c, i) => {
            try {
                const solar = await fetchSolar(c.lat, c.lng);
                if (_groupGen === myGen) CITIES_STATE[`grp_${name}_${i}`].solar = solar;
            } catch { /* show card without solar data */ }
            if (_groupGen === myGen) renderCards();
        }));

        if (_groupGen === myGen) startTick();
    }

    /* ── Custom city add ──────────────────────────────────────── */
    async function addCompareCity() {
        const val   = document.getElementById('compare-input').value.trim();
        const errEl = document.getElementById('compare-err');
        if (!val) return;
        errEl.style.display = 'none';

        try {
            const res = await fetch(
                'https://nominatim.openstreetmap.org/search'
                + `?format=json&limit=1&addressdetails=1`
                + `&q=${encodeURIComponent(val)}`
                + `&email=solarisswahili@users.noreply.github.com`
            ).then(r => r.json());

            if (!res.length) throw new Error('City not found');

            const lat = parseFloat(res[0].lat);
            const lng = parseFloat(res[0].lon);
            if (isNaN(lat) || isNaN(lng) || lat < -90 || lat > 90 || lng < -180 || lng > 180) {
                throw new Error('Invalid coordinates returned');
            }

            const id   = `custom_${Date.now()}`;
            const city = {
                name:      res[0].name || val,
                nameEn:    res[0].name || val,
                country:   res[0].address?.country  || '',
                countryEn: res[0].address?.country  || '',
                lat, lng,
            };
            CITIES_STATE[id] = { city, solar: null };
            renderCards();
            document.getElementById('compare-input').value = '';

            const solar = await fetchSolar(lat, lng);
            CITIES_STATE[id].solar = solar;
            renderCards();
            startTick();
        } catch (e) {
            errEl.textContent    = e.message;
            errEl.style.display  = 'block';
        }
    }

    /* ── Controls ─────────────────────────────────────────────── */
    function removeCity(id) {
        delete CITIES_STATE[id];
        renderCards();
        if (!Object.keys(CITIES_STATE).length && tickId) {
            clearInterval(tickId); tickId = null;
        }
    }

    function clearAll() {
        Object.keys(CITIES_STATE).forEach(k => delete CITIES_STATE[k]);
        if (tickId) { clearInterval(tickId); tickId = null; }
        renderCards();
    }

    function startTick() {
        if (tickId) clearInterval(tickId);
        tickId = setInterval(renderCards, 1_000);
    }

    /* Pause tick when tab is hidden */
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            if (tickId) { clearInterval(tickId); tickId = null; }
        } else if (Object.keys(CITIES_STATE).length) {
            startTick();
        }
    });

    /* Initialise with Libya group */
    loadGroup('libya');
    </script>
</body>
</html>
