<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#F3F4F6">
    <title>التوقيت السواحلي | SolarisSwahili</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&family=Tajawal:wght@300;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    
    <!-- تشغيل وضع الليل واللغة فورياً لتجنب وميض الصفحة -->
    <script src="js/theme.js"></script>
</head>
<body class="antialiased min-h-screen flex flex-col items-center px-4 relative">
    
<nav class="site-nav">
    <div class="nav-logo">
        <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/><path stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M12 2v3m0 14v3M4.22 4.22l2.12 2.12m11.32 11.32l2.12 2.12M2 12h3m14 0h3M4.22 19.78l2.12-2.12m11.32-11.32l2.12-2.12"/></svg>
    </div>
    <div class="nav-links" id="nav-links">
        <a href="index.html" class="nav-link active" data-i18n="navHome">الرئيسية</a>
        <a href="compare.html" class="nav-link" data-i18n="navCompare">مقارنة</a>
        <a href="dashboard.html" class="nav-link" data-i18n="navDashboard">إحصائيات</a>
    </div>
    <div class="nav-right">
        <button id="lang-toggle" class="lang-btn">EN</button>
        <button id="nav-toggle" class="nav-hamburger" aria-expanded="false"><span class="nav-hamburger-bar"></span><span class="nav-hamburger-bar"></span><span class="nav-hamburger-bar"></span></button>
    </div>
</nav>

<div id="stars-layer" class="fixed inset-0 pointer-events-none z-0"></div>

<!-- Loader -->
<div id="loader" class="fixed inset-0 flex flex-col gap-5 items-center justify-center transition-opacity duration-700 z-[100] bg-inherit">
    <div class="loader-ring"></div>
</div>

<div id="app-container" class="w-full max-w-xl flex flex-col gap-5 mt-28 pb-10 z-10 relative transition-opacity duration-700">
    
    <header class="card rounded-2xl px-6 py-4 text-center">
        <h1 class="header-title font-extrabold text-lg tracking-wide" data-i18n="siteTitle">التوقيت السواحلي التكيفي</h1>
        <p class="header-sub text-xs mt-1 max-w-sm mx-auto" data-i18n="siteSubtitle">كل ساعة 60 دقيقة قياسية تحسب منذ الشروق.</p>
    </header>

    <main class="card-deep rounded-3xl px-6 py-8 md:px-8 flex flex-col items-center">
        <!-- City Buttons injected by JS -->
        <nav id="city-selector" class="flex flex-wrap justify-center gap-2 mb-6 w-full border-b pb-4 border-[var(--glass-border)]"></nav>

        <h2 id="city-name" class="city-title font-extrabold text-3xl">--</h2>
        <p id="country-sub" class="country-sub mt-1 mb-8">--</p>

        <!-- Digital Swahili Display -->
        <div class="flex items-end gap-3 mb-2 text-center" dir="rtl">
            <span class="hour-word text-4xl" data-i18n="hourLabel">الساعة</span>
            <span id="hour-display" class="hour-num font-mono text-7xl font-extrabold">--</span>
        </div>
        <div id="phase-display" class="phase-pill text-sm font-bold px-6 py-1.5 rounded-full mb-6">--</div>
        
        <div id="metric-display" class="metric-num font-mono text-3xl font-bold mb-8">--:--:--</div>

        <!-- ARC Display -->
        <div class="relative w-full max-w-[340px] h-[185px] flex justify-center items-end mb-6">
            <svg id="sky-svg" viewBox="0 0 300 160" class="w-full h-full overflow-visible">
                <defs>
                    <linearGradient id="g-day" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#F59E0B"/><stop offset="100%" stop-color="#F97316"/>
                    </linearGradient>
                </defs>
                <path d="M 20 140 A 130 130 0 0 1 280 140" fill="none" stroke="var(--accent)" stroke-width="1.5" opacity="0.2"/>
                <path id="progress-arc" d="M 20 140 A 130 130 0 0 1 280 140" fill="none" stroke="url(#g-day)" stroke-width="4.5" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" stroke-linecap="round"/>
                
                <g id="celestial-body" transform="translate(20, 140)">
                    <circle id="sun-shape" cx="0" cy="0" r="7.5" fill="#fff" stroke="#F59E0B" stroke-width="3"/>
                    <circle id="moon-shape" cx="0" cy="0" r="7.5" fill="#F1F5F9" stroke="#818CF8" stroke-width="3" style="opacity:0"/>
                </g>
            </svg>
        </div>

        <footer class="footer-card w-full grid grid-cols-3 rounded-2xl py-5 px-3 text-center">
            <div class="flex flex-col gap-1.5"><span class="footer-lbl text-[0.65rem] font-bold" data-i18n="sunrise">الشروق</span><span id="sunrise-time" class="footer-val font-mono">--:--</span></div>
            <div class="flex flex-col gap-1.5 border-x border-[var(--glass-border)]"><span class="footer-lbl text-[0.6rem] font-bold" data-i18n="standardTime">التوقيت المدني</span><span id="standard-time" class="footer-val font-mono font-bold" dir="ltr">--:--:--</span></div>
            <div class="flex flex-col gap-1.5"><span class="footer-lbl text-[0.65rem] font-bold" data-i18n="sunset">الغروب</span><span id="sunset-time" class="footer-val font-mono">--:--</span></div>
        </footer>
    </main>
</div>

<!-- Includes Localization translation -->
<script src="js/i18n.js"></script>
<script src="js/app.js"></script>

</body>
</html>
